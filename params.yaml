# =========================
# in_job_searcher parameters
# =========================

# Search targets.
# Each item becomes a separate LinkedIn search query.
job_name:
  - "Senior Data Engineer"
  - "Staff Data Engineer"
  - "Principal Data Engineer"
  - "Data Architect"

# Informational search label kept for reference.
# The current scraper builds the LinkedIn URL from `geo_id` and `remote_filter_f_wt`.
location: "Remote"

# Number of LinkedIn result pages to visit for each job_name.
# LinkedIn typically shows about 25 jobs per page.
max_pages: 3

# Browser behavior.
# Set to true to run Chrome without opening a visible window.
headless: false

# Minimum and maximum random delay between actions.
# Using a range helps make navigation less aggressive.
sleep_min_seconds: 2.0
sleep_max_seconds: 5.0

# Output file path. Supported formats: .xlsx and .csv
output_file: "C:/Users/Danilo/OneDrive/Documents/Curriculo/2026/jobs_remote.xlsx"

# Reserved setting from older versions.
# The current logic updates existing rows by canonical job URL instead of appending duplicates.
append_existing_jobs: false

# If true, save the output file after each processed job.
# This is slower, but safer if the run is interrupted.
save_after_each_job: true

# Eligibility policy.
# When true, at least one positive keyword match is required unless explicitly overridden below.
require_at_least_one_positive_keyword: true

# If true, jobs without any positive keyword match may still be added,
# as long as they are not rejected by another rule.
allow_add_without_positive_match: false

# Positive ranking signals.
# Each matched keyword adds its weight to the final score.
positive_keywords:
  # "Data Engineer": 5
  # "Senior Data Engineer": 6
  # "Staff Data Engineer": 7
  # "Data Architect": 5

  # "Remote": 1
  "Remote from anywhere": 10
  "remote first": 7
  "remote-first": 7
  "work from anywhere": 10
  "Worldwide": 10
  # "Distributed team": 4
  # "global team": 4
  # "LATAM": 6
  # "global": 4
  # "(global)": 4
  # "B2B ": 10
  # "Databricks": 6
  # "Azure": 6
  # "Pipeline": 3
  # "Independent contractor": 7
  "Contractor": 7
  "Brazil": 3
  "Brasil": 3
  "LATAM": 3
  "Work From Home": 4
  "WFH": 4
  "LI-Remote": 5

# Negative ranking signals.
# Each matched keyword subtracts its weight from the final score,
# but does not automatically remove the job.
negative_keywords:
  "Software developer": 4
  "based in US": 6
  "US based": 6
  "Remote from US": 6
  "Must be located in": 6
  "come onsite": 6
  "Relocation": 6
  "Relocating": 6
  # "Remote Canada": 4
  # "Remote United States": 6
  # "anywhere in the EU": 5
  # "US citizens": 10
  # "reside in the United States": 10
  # "US only": 10
  # "W2 only": 10
  # "1099 US only": 10
  # "C2C US only": 10
  "W2 position": 8
  "work authorization": 8
  "HYBRID": 8
  "hybrid": 8
  "anywhere within the European": 20
  "Power BI": 10
  "Possible on-site locations": 10
  "US locations": 7
  "crypto": 3
  "W3": 3
  "Strong experience with AWS": 3

# Hard exclusion keywords.
# If any of these strings appears in the combined job text,
# the job is not added to the output.
blocklist_keywords:
  - "US citizens only"
  - "must be a US citizen"
  - "active U.S. government issued security clearance"
  - "TS/SCI"
  - "security clearance required"
  - "live in the UK"
  - "based out of Netherlands"
  - "Remote (US)"
  - "No third-party candidates"
  - "Remote in UK"
  - "remotely from within Canada"
  - "eligible to work for any US employer"
  - "residency in the U.S"
  - "Germany (Remote)"
  - "Spain (Remote)"
  - "Romania (Remote)"
  - "W2"
  - "Mexico - Remote"
  - "anywhere across Lithuania"
  - "anywhere in the continental U.S"
  - "no third parties"
  - "relocating to Barcelona"
  - "Portugal | Remote"
  - "anywhere across Latvia"
  - "Remote Canada"
  - "Remote United States"
  - "anywhere in the EU"
  - "US citizens"
  - "reside in the United States"
  - "US only"
  - "W2 only"
  - "1099 US only"
  - "C2C US only"
  - "Remote from US"
  - "Remote (Canada)"
  - "Remote (Portugal)"
  - "U.S. Citizenship"
  - "Europe remote"
  - "Remote, United States"
  - "Poland Remote"
  - "Only in Argentina"
  - "Location: Europe (EU)"
  - "Remote from Poland"
  - "anywhere in the United States"
  - "anywhere in the US"
  - "Remote (Poland)"

# Company-name exclusions.
# If the company name contains one of these entries,
# the job is marked as Skipped with the matching reason.
blocked_companies:
  - "BairesDev"
  - "Tata Consultancy Services"
  - "Proxify"
  - "Aubay Portugal"

# Description language filter.
# If enabled, the job description is language-detected after removing common UI prefixes.
exclude_non_english_descriptions: true

# Allowed language codes for job descriptions.
# Keep `en` to accept English-only descriptions.
allowed_description_languages:
  - "en"

# If true, language detection failures also exclude the job.
# If false, only confirmed non-allowed languages are excluded.
exclude_when_language_detection_fails: false

# Generic geography/locality filter.
# If enabled, the scraper looks for these terms in title, company, location, and description.
# Matches are marked as Skipped for existing rows or ignored for new rows.
exclude_by_location_keywords: true
location_filter_keywords:
  - "India"
  - "Bangalore"
  - "Bengaluru"
  - "Hyderabad, India"
  - "Pune"
  - "Mumbai"
  - "Chennai"
  - "Gurugram"
  - "Noida"
  - "New Delhi"
  - "Remote - India"
  - "India (Remote)"
  - "Cingapura"
  - "Índia"

# Jobs in this list are always ignored by LinkedIn job ID.
ignored_job_ids:
  - "4370882746"

# Apply row coloring in Excel output based on status.
apply_row_formatting: true

# LinkedIn search URL controls.
# Geo ids are searched in order for each configured job_name.
geo_id:
  - 92000000   # Worldwide
  - 91000011   # LATAM
  - 106057199  # Brazil

# LinkedIn remote-work filter used in the search URL.
# `2` is the remote filter currently used by this project.
remote_filter_f_wt: 2

# Pagination step used by LinkedIn result pages.
# In practice this is usually 25 jobs per page.
start_step: 25

# If true, ask LinkedIn to sort by newest jobs first.
sort_by_most_recent: true

# Texts used to detect closed jobs in the job details page.
status_closed_texts:
  - "NÃ£o aceita mais candidaturas"
  - "No longer accepting applications"
  - "This job is no longer accepting applications"

# Texts used to detect applied jobs in the job details page.
status_applied_texts:
  - "Candidatou-se"
  - "Candidatou-se no site da empresa"
  - "Candidatura enviada"
  - "Applied"
  - "You applied"
  - "Application submitted"
  - "Applied on company website"
  - "Applied on the company website"

# Required title terms.
# At least one of these must appear in the normalized job title.
required_title_keywords:
  - "data engineer"
  - "analytics engineer"
  - "staff data engineer"
  - "senior data engineer"
  - "principal data engineer"
  - "data"

# Title-level exclusions.
# If one of these appears in the title, the row is marked as canceled.
title_blocklist_keywords:
  - "software engineer"
  - "frontend"
  - "fullstack"
  - "ML"
  - "Python Developer"

# =========================
# Scraping selectors
# =========================

# CSS selector for each job card container in the LinkedIn results list.
job_container_selector: "div.artdeco-entity-lockup__content"

# CSS selector used to extract the clickable job link from each card.
job_link_selector: 'a[href*="/jobs/view/"]'

# CSS selector used to read the company name from a job card.
company_selector: "div.artdeco-entity-lockup__subtitle span"

# CSS selector used to read the displayed location from a job card.
location_selector: "div.artdeco-entity-lockup__caption span"

# CSS selectors checked in order to read the job description area.
description_selectors:
  - "div.jobs-description__content"
  - "div.jobs-box__html-content"

# Candidate CSS selectors for the left-side scrollable results panel.
# The scraper uses the first selector that exists on the page.
left_list_scroll_container_selectors:
  - "div.scaffold-layout__list"
  # - "div.scaffold-layout__list-container"
  # - "div.jobs-search-results-list"
  # - "div.scaffold-layout__list-detail-inner"

# Maximum number of scrolling rounds used to load more jobs in the left panel.
left_list_scroll_max_rounds: 25

# Base pause between left-panel scroll attempts.
left_list_scroll_pause_seconds: 1.0

# CSS selectors used by the status detector.
status_selectors:
  # Success banner shown after a LinkedIn Easy Apply submission.
  applied_banner: "div.artdeco-inline-feedback--success span.artdeco-inline-feedback__message"

  # Generic alert containers that may include closed/applied messages.
  any_alert_container: '[role="alert"]'

  # Root node used to gather visible text while checking status.
  right_panel_root: "body"

  # Reserved selector for future use with dedicated application-status sections.
  application_status_section: "section, div"
